{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card p-4">

            <h2 class="text-center mb-4">
                Add New Task
            </h2>

            <form method="POST">

                {% csrf_token %}

                <label class="form-label">
                    Task Title
                </label>

                <input type="text"
                       name="title"
                       class="form-control mb-3"
                       placeholder="Enter Task Title"
                       required>

                <label class="form-label">
                    Description
                </label>

                <textarea name="description"
                          class="form-control mb-3"
                          rows="4"
                          placeholder="Enter Task Description"
                          required></textarea>

                <label class="form-label">
                    Status
                </label>

                <select name="status"
                        class="form-control mb-4">

                    <option value="Pending">
                        Pending
                    </option>

                    <option value="In Progress">
                        In Progress
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                </select>

                <button type="submit"
                        class="btn btn-primary w-100">

                    Save Task

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
